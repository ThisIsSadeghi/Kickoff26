<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>STADIUM_PRO | Connection Lost</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&amp;family=Outfit:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: '#0A1209',
                        surface: '#141E12',
                        'surface-variant': '#1E3020',
                        'on-surface': '#E2EEDF',
                        'on-surface-variant': '#A5C0A0',
                        outline: '#5C7A5A',
                        'outline-variant': '#2E4A2C',
                        primary: '#86E8AB',
                        'on-primary': '#003919',
                        'primary-container': '#005227',
                        'on-primary-container': '#C8FFD7',
                        error: '#FFB4AB',
                        'on-error': '#690005',
                        'error-container': '#93000A',
                        'on-error-container': '#FFDAD6',
                        secondary: '#FFD700',
                        tertiary: '#4FC3F7',
                    },
                    borderRadius: {
                        'DEFAULT': '0.5rem',
                        'sm': '6px',
                        'md': '12px',
                        'lg': '1rem',
                        'xl': '1.5rem',
                        '2xl': '20px',
                        'full': '9999px'
                    },
                    fontFamily: {
                        headline: ['Outfit', 'Public Sans', 'sans-serif'],
                        display: ['Outfit', 'Public Sans', 'sans-serif'],
                        body: ['Public Sans', 'sans-serif'],
                        label: ['Public Sans', 'sans-serif'],
                    },
                    fontSize: {
                        'display-lg': ['57px', '64px'],
                        'headline-lg': ['32px', '40px'],
                        'headline-md': ['28px', '36px'],
                        'headline-sm': ['24px', '32px'],
                        'body-md': ['16px', '24px'],
                        'label-md': ['12px', '16px'],
                    },
                    letterSpacing: {
                        tightest: '-.05em',
                        tighter: '-.02em',
                        widest: '.2em',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined.icon-large {
            font-size: 96px;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            color: #FFB4AB;
        }
        .stadium-glow {
            background: radial-gradient(circle at 50% 50%, rgba(134, 232, 171, 0.05) 0%, rgba(10, 18, 9, 0) 70%);
        }
        @keyframes pulse-subtle {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .icon-animate {
            animation: pulse-subtle 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden relative">
<!-- Atmospheric Background Glow -->
<div class="fixed inset-0 stadium-glow pointer-events-none"></div>
<!-- Main Content Column -->
<main class="relative z-10 w-full max-w-xs flex flex-col items-center text-center px-6">
<!-- Main Icon -->
<div class="mb-8 icon-animate">
<span class="material-symbols-outlined icon-large select-none">
                sports_soccer
            </span>
</div>
<!-- Title -->
<h1 class="font-headline font-bold text-headline-sm text-on-surface tracking-tight mb-3">
            Oops! Connection lost
        </h1>
<!-- Subtitle -->
<p class="font-body text-body-md text-on-surface-variant mb-12 leading-relaxed">
            Check your connection and try again.
        </p>
<!-- High-Contrast Retry Button -->
<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold text-base rounded-xl transition-all duration-200 active:scale-95 hover:brightness-105 shadow-lg shadow-primary/10 flex items-center justify-center uppercase tracking-wider" onclick="handleRetry(this)">
            RETRY
        </button>
</main>
<script>
        function handleRetry(btn) {
            const originalContent = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-on-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;
            btn.disabled = true;
            
            // Brief delay before actual reload to simulate processing
            setTimeout(() => {
                window.location.reload();
            }, 800);
        }

        // Background micro-interaction
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const glow = document.querySelector('.stadium-glow');
            if (glow) {
                glow.style.transform = `translate(${(x - 0.5) * 15}px, ${(y - 0.5) * 15}px)`;
            }
        });
    </script>
</body></html>
