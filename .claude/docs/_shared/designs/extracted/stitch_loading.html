<style>
        body {
            background-color: #0d150c;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .spinner-container {
            position: relative;
            width: 48px;
            height: 48px;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(134, 232, 171, 0.1);
            border-top: 4px solid #86e8ab;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0 0 8px rgba(134, 232, 171, 0.4));
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Material Ripple effect for atmospheric feel */
        .glow-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 64px;
            height: 64px;
            background: radial-gradient(circle, rgba(134, 232, 171, 0.15) 0%, rgba(13, 21, 12, 0) 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; scale: 1; }
            50% { opacity: 1; scale: 1.5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background">
<!-- 
        Generic Mobile Loading State 
        - Hierarchy: Suppressing all navigation elements (TopAppBar, BottomNavBar) per user instructions.
        - Intent: Transactional/Focused waiting state.
    -->
<main class="flex flex-col items-center justify-center w-full h-full">
<div class="spinner-container">
<div class="glow-pulse"></div>
<div class="spinner"></div>
</div>
</main>
<script>
        // Micro-interaction: Smooth entry animation for the spinner
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.spinner-container');
            container.style.opacity = '0';
            container.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                container.style.transition = 'opacity 0.6s ease-out, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                container.style.opacity = '1';
                container.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body></html>
